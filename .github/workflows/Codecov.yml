name: Codecov

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed

jobs:
  upload:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event != 'schedule'
    permissions:
      actions: read
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: /tmp/coverage-artifacts
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore coverage files
        run: |
          for pkg_dir in /tmp/coverage-artifacts/*/; do
            pkg=$(basename "$pkg_dir")
            if [ -d "$pkg" ]; then
              cp -v "$pkg_dir"*.json "$pkg/" 2>/dev/null || true
            fi
          done
      - name: Resolve PR number from commit SHA
        id: resolve_pr
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const sha = process.env.COMMIT_SHA;
            const { owner, repo } = context.repo;

            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            const prNumber = pulls.length > 0 ? String(pulls[0].number) : "";
            core.info(`Resolved PR number for ${sha}: ${prNumber || "none"}`);
            core.setOutput("pr_number", prNumber);
      - name: Log resolved PR number
        run: |
          if [ -n "${{ steps.resolve_pr.outputs.pr_number }}" ]; then
            echo "Resolved PR number: ${{ steps.resolve_pr.outputs.pr_number }}"
          else
            echo "Resolved PR number: none"
          fi
      - name: Upload to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CODECOV_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          CODECOV_BRANCH: ${{ github.event.workflow_run.head_branch }}
          CODECOV_PR: ${{ steps.resolve_pr.outputs.pr_number }}
        run: ./dev/upload_codecov.sh
